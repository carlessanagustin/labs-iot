apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/carlessanagustin/labs-iot.git
    targetRevision: master
    path: apps/telemetry-api
  destination:
    server: https://kubernetes.default.svc
    namespace: iot-platform
  syncPolicy:
    automated:
      enabled: false
      prune: true
      selfHeal: true