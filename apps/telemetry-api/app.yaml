apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/iot-gitops.git
    targetRevision: main
    path: apps/telemetry-api
  destination:
    server: https://kubernetes.default.svc
    namespace: iot-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true