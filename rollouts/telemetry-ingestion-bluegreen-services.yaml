# kubectl apply -f rollouts/telemetry-ingestion-bluegreen-services.yaml
# kubectl delete -f rollouts/telemetry-ingestion-bluegreen-services.yaml
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingestion-active
  namespace: iot-platform
spec:
  selector:
    app: telemetry-ingestion
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingestion-preview
  namespace: iot-platform
spec:
  selector:
    app: telemetry-ingestion
  ports:
    - port: 80
      targetPort: 80

